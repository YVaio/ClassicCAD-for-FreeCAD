  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '20'

  - name: Run README update
    env:
      # If your project is repo-scoped you can use the built-in token:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # If you need a PAT for user/org project, replace the line above with:
      # GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
    run: |
      node scripts/update-readme.js \
        --owner "YVaio" \
        --project-number 1 \
        --readme "README.md" \
        --start-marker "<!-- PROJECT_ISSUES:START -->" \
        --end-marker "<!-- PROJECT_ISSUES:END -->"