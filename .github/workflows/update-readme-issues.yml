name: Update README with repo issues

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *' # daily at 08:00 UTC

# Grant write permission so GITHUB_TOKEN can push changes
permissions:
  contents: write

jobs:
  update-readme-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run README issues updater
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/update-readme-issues.js \
            --owner "YVaio" \
            --repo "ClassicCAD-for-FreeCAD" \
            --readme "README.md" \
            --start-marker "<!-- ISSUES_LIST:START -->" \
            --end-marker "<!-- ISSUES_LIST:END -->" \
            --state "open" \
            --per-page 100 \
            --commit