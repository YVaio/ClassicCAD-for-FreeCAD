  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '20'

  - name: Run README issues updater
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    run: |
      node scripts/update-readme-issues.js \
        --owner "YVaio" \
        --repo "ClassicCAD-for-FreeCAD" \
        --readme "README.md" \
        --start-marker "<!-- ISSUES_LIST:START -->" \
        --end-marker "<!-- ISSUES_LIST:END -->" \
        --state "open" \
        --per-page 100 \
        --commit